<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 900" role="img" aria-labelledby="title desc">
  <title id="title">소나 기술 신호 코어</title>
  <desc id="desc">해저 지형 등고선과 연결된 기술 신호를 표현한 구형 소나 인터페이스</desc>
  <defs>
    <radialGradient id="ocean" cx="38%" cy="30%" r="78%">
      <stop offset="0" stop-color="#123d3b"/>
      <stop offset=".45" stop-color="#082321"/>
      <stop offset=".78" stop-color="#031312"/>
      <stop offset="1" stop-color="#010707"/>
    </radialGradient>
    <radialGradient id="depth" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#51ffb5" stop-opacity=".14"/>
      <stop offset=".48" stop-color="#20d99a" stop-opacity=".04"/>
      <stop offset="1" stop-color="#00100e" stop-opacity=".46"/>
    </radialGradient>
    <linearGradient id="contour" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#72ffd0"/>
      <stop offset=".55" stop-color="#24cba1"/>
      <stop offset="1" stop-color="#54dfff"/>
    </linearGradient>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <clipPath id="sphere"><circle cx="450" cy="450" r="420"/></clipPath>
  </defs>

